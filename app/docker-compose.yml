version: "3.9"

services:
  db:
    image: postgis/postgis:16-3.4
    container_name: imaging-db
    environment:
      POSTGRES_DB: imaging
      POSTGRES_USER: imaging
      POSTGRES_PASSWORD: imaging
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: imaging-backend
    command: gunicorn core.wsgi:application --bind 0.0.0.0:8000
    environment:
      DJANGO_SETTINGS_MODULE: core.settings
      PYTHONUNBUFFERED: "1"
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    depends_on:
      - db

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: imaging-frontend
    environment:
      NODE_ENV: development
    volumes:
      - ./frontend:/app
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  db_data:

